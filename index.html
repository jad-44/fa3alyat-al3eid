<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فعاليات العيد</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- صفحة التسجيل -->
<div id="registerPage">
  <h1>أهلا بيك في اختبار فعاليات العيد!</h1>
  <p>أدخل اسمك وابدأ الاختبار:</p>
  <input type="text" id="username" placeholder="اسمك">
  <button id="startBtn">ابدأ الاختبار</button>
</div>

<!-- صفحة الأسئلة -->
<div id="quizPage" style="display:none;">
  <div id="generationTransition" style="display:none;">
    <h2 id="generationTitle">جيل الأحفاد</h2>
    <p id="generationText">استعد لاختبار معلوماتك عن العائلة 😄</p>
    <button id="startGenBtn">يلا نبدأ →</button>
  </div>

  <div id="questionContainer">
    <h2 id="questionText">السؤال هنا</h2>
    <div class="options">
      <button class="optionBtn" data-index="0">خيار 1</button>
      <button class="optionBtn" data-index="1">خيار 2</button>
      <button class="optionBtn" data-index="2">خيار 3</button>
    </div>
    <button id="nextBtn">التالي</button>
    <div id="progressBar"><div id="progress"></div></div>
  </div>
</div>

<!-- صفحة النتائج -->
<div id="resultPage" style="display:none;">
  <h2>نتيجتك</h2>
  <p id="resultText"></p>
  <p id="titleText"></p>
</div>

<script src="script.js"></script>
</body>
    </html>

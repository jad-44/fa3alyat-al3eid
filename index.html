<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فعاليات العيد</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Amiri&display=swap');
  body { font-family: 'Amiri', serif; margin:0; padding:0; text-align:center; color:#fff; overflow-x:hidden; }
  .container { max-width:600px; margin:auto; padding:20px; position:relative; z-index:2; }
  h1 { margin-top:30px; font-size:2em; text-shadow: 2px 2px #444; }
  p { font-size:1.1em; text-shadow: 1px 1px #333; }
  .question-box { background-color:rgba(255,255,255,0.9); color:#000; border-radius:15px; padding:20px; margin:20px 0; min-height:80px; display:flex; align-items:center; justify-content:center; font-size:1.1em; }
  .option { background:linear-gradient(90deg,#C877BF,#F29DC1); color:#fff; padding:10px; margin:10px 0; border-radius:10px; cursor:pointer; transition:0.3s; }
  .option:hover { transform:scale(1.05); }
  .progress-bar { width:100%; background-color:rgba(255,255,255,0.3); border-radius:10px; overflow:hidden; margin-top:20px; height:15px; }
  .progress { width:0%; height:100%; background:linear-gradient(90deg,#30B8B2,#86E2D5); transition: width 0.3s ease; }
  .next-btn { margin-top:20px; padding:10px 20px; background:linear-gradient(90deg,#F7C845,#F2A65F); border:none; border-radius:10px; cursor:pointer; font-weight:bold; }
  .hidden { display:none; }
  .transition-box { font-size:1.2em; padding:40px 20px; min-height:150px; display:flex; align-items:center; justify-content:center; flex-direction:column; color:#fff; text-shadow:1px 1px #333;}
  #startPage { background:linear-gradient(to bottom,#F66483,#F29DC1); min-height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; }
  #quizPage, #transitionPage, #resultPage { min-height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; }
  
  /* نجوم متحركة */
  body::before {
    content:"";
    position:fixed;
    top:0; left:0; width:200%; height:200%; background:transparent;
    background-image: radial-gradient(#fff 1px, transparent 1px), radial-gradient(#fff 1px, transparent 1px);
    background-size:50px 50px, 100px 100px;
    animation: starMove 50s linear infinite;
    z-index:1;
  }
  @keyframes starMove {
    0% { transform: translate(0,0);}
    100% { transform: translate(-500px,-500px);}
  }

</style>
</head>
<body>

<div class="container" id="startPage">
  <h1>🎉 فعاليات العيد 🎉</h1>
  <p>اختبار مرح عن الأسرة مقسم لثلاثة أجيال.  
  شوف كم تعرف عن أحفاد، آباء، وأجداد العيلة!  
  استعد للضحك والمفاجآت 🌟</p>
  <button class="next-btn" id="startBtn">ابدأ الاختبار</button>
</div>

<div class="container hidden" id="quizPage">
  <div class="question-box" id="questionBox"></div>
  <div id="optionsContainer"></div>
  <button class="next-btn" id="nextBtn">التالي</button>
  <div class="progress-bar"><div class="progress" id="progress"></div></div>
</div>

<div class="container hidden" id="transitionPage">
  <div class="transition-box" id="transitionText"></div>
  <button class="next-btn" id="transitionBtn">تابع</button>
</div>

<div class="container hidden" id="resultPage">
  <h1>🎯 نتيجتك 🎯</h1>
  <div class="question-box" id="resultTitle"></div>
  <p id="resultDesc" style="color:#fff; margin-top:20px; font-size:1.2em;"></p>
  <p style="margin-top:10px;">💫 مهما بعدتنا المسافات حنظل متلمين 💫</p>
</div>

<script>
const questions = [
  {question:"من هي فشونيستا الأسرة؟", options:["حنين","جوري","ميرا"], answer:"حنين", generation:"الأحفاد"},
  {question:"من هو أو هي الحفيد الأعظم؟", options:["فاتن","نادية","أريج"], answer:"نادية", generation:"الأحفاد"},
  {question:"من هو الشخص الذي أتى إلى حياتنا سنة 2006 ومن بعده أشرقت الحياة؟", options:["توتوتوتي","نيرة","أروى"], answer:"نيرة", generation:"الأحفاد"},
  {question:"من مؤلف 'نسا الطاهر نجاحك ظاهر'؟", options:["البراء","عباس","أحمد عثمان"], answer:"أحمد عثمان", generation:"الأحفاد"},
  {question:"من القائل: 'بلمي النبي القرقرقرقر'؟", options:["العمة انتصار","العم يعقوب","العمة ابتسام"], answer:"العم يعقوب", generation:"الآباء"},
  {question:"من الخال الوحيد المفضل؟", options:["عثمان درار","خالو عثمان","كل الإجابات صحيحة"], answer:"كل الإجابات صحيحة", generation:"الآباء"},
  {question:"من هي صديقة عمتو جديدة المفضلة؟", options:["سارة","سليمة","سناء"], answer:"سارة", generation:"الآباء"},
  {question:"من القائل: 'أنا عندي حس أمني'؟", options:["العمة رقية","الخالة صباح","العمة انتصار"], answer:"العمة انتصار", generation:"الآباء"},
  {question:"من هو عم الجميع وجد الجميع؟", options:["مصطفى عبد اللطيف","إبراهيم صالح","محمد أحمد"], answer:"مصطفى عبد اللطيف", generation:"الأجداد"},
  {question:"من هي السباحة الأولمبية؟", options:["شباك","برتودة","نصرة"], answer:"نصرة", generation:"الأجداد"},
  {question:"من الحبوبة التي حلقوا لها وركبوها الساقية؟", options:["زينب","حليمة","فاطمة"], answer:"حليمة", generation:"الأجداد"},
  {question:"من هو الجد الطائر؟", options:["درار","عدنان","عثمان"], answer:"عدنان", generation:"الأجداد"}
];

const generationColors = { "الأحفاد":"#F66483", "الآباء":"#F7C845", "الأجداد":"#8B5E3C" };
const transitionTexts = {
  "الأحفاد":"✨ انتهت مرحلة الأحفاد! استعد لمرحلة الآباء! ✨",
  "الآباء":"🌟 مرحلة الآباء انتهت، التحدي الحقيقي الآن: جيل الأجداد! 🌟"
};

const results = [
  {min:0, max:3, title:"مخ دامنو", desc:"سجم أمك الراجياك فك التلفون واقعد مع الناس"},
  {min:4, max:6, title:"الطاهر برو", desc:"حتى لو انت ما برو لكن وصلت مرحلة جيدة"},
  {min:7, max:9, title:"اوقج مني", desc:"ما قصرت تب"},
  {min:10, max:12, title:"درار الكبير", desc:"انت مو درار… انت أبو درار"}
];

let currentQuestion = 0;
let score = 0;

const startPage = document.getElementById('startPage');
const quizPage = document.getElementById('quizPage');
const transitionPage = document.getElementById('transitionPage');
const resultPage = document.getElementById('resultPage');

const startBtn = document.getElementById('startBtn');
const nextBtn = document.getElementById('nextBtn');
const transitionBtn = document.getElementById('transitionBtn');

const questionBox = document.getElementById('questionBox');
const optionsContainer = document.getElementById('optionsContainer');
const progress = document.getElementById('progress');
const transitionText = document.getElementById('transitionText');

const resultTitle = document.getElementById('resultTitle');
const resultDesc = document.getElementById('resultDesc');

startBtn.onclick = () => { startPage.classList.add('hidden'); quizPage.classList.remove('hidden'); loadQuestion(); };

function loadQuestion() {
  const q = questions[currentQuestion];
  questionBox.textContent = q.question;
  optionsContainer.innerHTML = '';
  questions[currentQuestion].options.forEach(opt => {
    const btn = document.createElement('div');
    btn.className = 'option';
    btn.textContent = opt;
    btn.onclick = () => selectOption(opt);
    optionsContainer.appendChild(btn);
  });
  quizPage.style.background = `linear-gradient(to bottom, ${generationColors[q.generation]}88, ${generationColors[q.generation]}44)`;
  progress.style.width = (currentQuestion / questions.length * 100) + '%';
}

function selectOption(selected) {
  if(selected === questions[currentQuestion].answer) score++;
}

nextBtn.onclick = () => {
  const currentGen = questions[currentQuestion].generation;
  currentQuestion++;
  if(currentQuestion < questions.length){
    const nextGen = questions[currentQuestion].generation;
    if(nextGen !== currentGen){
      quizPage.classList.add('hidden');
      transitionPage.classList.remove('hidden');
      transitionText.textContent = transitionTexts[currentGen];
    } else {
      loadQuestion();
    }
  } else {
    showResult();
  }
};

transitionBtn.onclick = () => {
  transitionPage.classList.add('hidden');
  quizPage.classList.remove('hidden');
  loadQuestion();
};

function showResult() {
  quizPage.classList.add('hidden');
  resultPage.classList.remove('hidden');
  let r = results.find(res => score >= res.min && score <= res.max);
  resultTitle.textContent = r.title;
  resultDesc.textContent = r.desc;
  progress.style.width = '100%';
}
</script>
</body>
</html>
